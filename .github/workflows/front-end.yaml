name: Prod front-end to Docker Hub

permissions:
  contents: read

on: workflow_dispatch  # Manual trigger

jobs:
  build-and-push:
    # This job will only run on a self-hosted runner that has these labels.
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          repository: 'medusajs/medusa'
          ref: 'develop'
          token: ${{ secrets.MY_PERSONAL_TOKEN }}

      - name: Checkout Dockerfile repository
        uses: actions/checkout@v4
        with:
          repository: 'medusa-project-k8s/medusa-project-frontend'
          ref: 'main'
          token: ${{ secrets.MY_PERSONAL_TOKEN }}
          path: .

      # Option 2: Download Dockerfile from URL
      # - name: Download Dockerfile
      #   run: |
      #     curl -o Dockerfile https://raw.githubusercontent.com/YourOrg/repo/main/path/to/Dockerfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags:
            ${{ secrets.DOCKER_HUB_USERNAME }}/medusa-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_MEDUSA_BACKEND_URL=${{ secrets.NEXT_PUBLIC_MEDUSA_BACKEND_URL }}
        # Required GitHub Actions secrets:
        #   NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY  - from Medusa Admin → Settings → Publishable API Keys (e.g. pk_...)
        #   NEXT_PUBLIC_MEDUSA_BACKEND_URL      - optional, backend URL for store (e.g. https://api.example.com)
        #   DOCKER_HUB_USERNAME, DOCKER_HUB_TOKEN, MY_PERSONAL_TOKEN
