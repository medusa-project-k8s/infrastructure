# Strip /api so backend receives /store, /admin, /health, etc.
# Used by medusa-backend Ingress so client calls .../api/store/... and backend gets /store/...
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api
  namespace: medusa-store
spec:
  stripPrefix:
    prefixes:
      - "/api"
