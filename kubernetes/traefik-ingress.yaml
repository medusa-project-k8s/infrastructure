apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: medusa-api-host
  namespace: medusa-store
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.persephone.com`)
      kind: Rule
      services:
        - name: medusa-backend
          port: 9000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: medusa-storefront-host
  namespace: medusa-store
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`persephone.com`) && (PathPrefix(`/app`) || PathPrefix(`/admin`) || PathPrefix(`/auth`) || PathRegexp(`^/[a-z]{2}/admin`))
      kind: Rule
      priority: 100
      services:
        - name: medusa-backend
          port: 9000
    - match: Host(`persephone.com`) && PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: medusa-frontend
          port: 8000
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: traefik-dashboard-redirect
  namespace: traefik
spec:
  redirectRegex:
    regex: "^https?://traefik\\.persephone\\.com/?$"
    replacement: "http://traefik.persephone.com/dashboard/"
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`traefik.persephone.com`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      priority: 10000
      services:
        - name: api@internal
          kind: TraefikService
    - match: Host(`traefik.persephone.com`) && Path(`/`)
      kind: Rule
      priority: 9000
      middlewares:
        - name: traefik-dashboard-redirect
      services:
        # Redirect-only route; noop@internal is Traefik’s no-op backend
        - name: noop@internal
          kind: TraefikService
