# Single entry: Client -> Traefik (LoadBalancer) -> frontend or backend by path.
# Apply: traefik-middleware.yaml first (requires Traefik CRD provider).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medusa-backend
  namespace: medusa-store
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: medusa-store-strip-api@kubernetescrd
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: medusa-backend
                port:
                  number: 9000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: medusa-frontend
  namespace: medusa-store
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: medusa-frontend
                port:
                  number: 8000
