# Traefik IngressRoutes — Medusa API host + shop host (Next + Medusa paths on same domain).
#
# DNS /etc/hosts:  192.168.0.160  persephone.com api.persephone.com
#
# - api.persephone.com → Medusa only (store API, admin at /app, /admin, /auth, /static).
# - persephone.com → Next.js, except /app /admin /auth /{xx}/admin → Medusa (Admin on shop domain).
#
# Apply: kubectl apply -f traefik-ingress.yaml
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: medusa-api-host
  namespace: medusa-store
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`api.persephone.com`)
      kind: Rule
      services:
        - name: medusa-backend
          port: 9000
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: medusa-storefront-host
  namespace: medusa-store
spec:
  entryPoints:
    - web
  routes:
    - match: Host(`persephone.com`) && (PathPrefix(`/app`) || PathPrefix(`/admin`) || PathPrefix(`/auth`) || PathRegexp(`^/[a-z]{2}/admin`))
      kind: Rule
      priority: 100
      services:
        - name: medusa-backend
          port: 9000
    - match: Host(`persephone.com`) && PathPrefix(`/`)
      kind: Rule
      priority: 1
      services:
        - name: medusa-frontend
          port: 8000
