# ============================================
# Medusa Backend (StatefulSet)
# Switching from Deployment: kubectl delete deployment medusa-backend -n medusa-store
# ============================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: medusa-config
  namespace: medusa-store
data:
  NODE_ENV: "production"
#  REDIS_URL: "redis://redis-master.medusa-store.svc.cluster.local:6379"

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: medusa-backend
  namespace: medusa-store
spec:
  serviceName: medusa-backend-headless
  replicas: 1
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      partition: 0
  selector:
    matchLabels:
      app: medusa-backend
  template:
    metadata:
      labels:
        app: medusa-backend
    spec:
      terminationGracePeriodSeconds: 180
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["backend-worker"]
      containers:
      - name: medusa
        image: efirshey/medusa-backend:714390954639cdf0519db49e2eac5d2945eed340
        imagePullPolicy: Always
        ports:
        - containerPort: 9000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://redis-master.medusa-store.svc.cluster.local:6379"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: JWT_SECRET
        - name: COOKIE_SECRET
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: COOKIE_SECRET
        # Public URL for image/file URLs — use API hostname (see traefik-ingress.yaml)
        - name: BACKEND_PUBLIC_URL
          value: "http://api.persephone.com"
        - name: STORE_CORS
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: STORE_CORS
        - name: ADMIN_CORS
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: ADMIN_CORS
        - name: AUTH_CORS
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: AUTH_CORS
        # Allow time for: wait for DB + build (~50s) + migrations; avoid killing pod during startup
        livenessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 180
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 9000
          initialDelaySeconds: 120
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "500m"
      restartPolicy: Always
---

# Headless service — required by StatefulSet (spec.serviceName). Stable DNS: medusa-backend-0.medusa-backend-headless.medusa-store.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: medusa-backend-headless
  namespace: medusa-store
spec:
  clusterIP: None
  selector:
    app: medusa-backend
  ports:
  - port: 9000
    targetPort: 9000
    protocol: TCP
    name: http
