# ============================================
# Medusa Frontend
# ============================================
# Middleware (Node): DEFAULT_REGION, MEDUSA_BACKEND_URL from Secret. NEXT_PUBLIC_* baked at build.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: medusa-frontend
  namespace: medusa-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: medusa-frontend
  template:
    metadata:
      labels:
        app: medusa-frontend
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values: ["frontend-worker"]
      containers:
      - name: medusa-frontend
        image: efirshey/medusa-frontend:6eaed04ebc75607cd0108ba37312a2f61a0b696e
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: MEDUSA_BACKEND_URL
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: MEDUSA_BACKEND_URL
        - name: NEXT_PUBLIC_MEDUSA_BACKEND_URL
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: NEXT_PUBLIC_MEDUSA_BACKEND_URL
        - name: REACT_APP_API_URL
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: REACT_APP_API_URL
        - name: NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY
              optional: true
        - name: MEDUSA_PUBLISHABLE_KEY
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: MEDUSA_PUBLISHABLE_KEY
              optional: true
        - name: DEFAULT_REGION
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: DEFAULT_REGION
              optional: true
        - name: REGION_MIDDLEWARE_STATIC
          valueFrom:
            secretKeyRef:
              name: medusa-secrets
              key: REGION_MIDDLEWARE_STATIC
              optional: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"


---
# ClusterIP. External: 160 via Traefik (entrypoint web).
apiVersion: v1
kind: Service
metadata:
  name: medusa-frontend
  namespace: medusa-store
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: medusa-frontend
